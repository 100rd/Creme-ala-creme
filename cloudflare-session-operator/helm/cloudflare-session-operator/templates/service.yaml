apiVersion: v1
kind: Service
metadata:
  name: {{ include "cloudflare-session-operator.fullname" . }}-metrics
  labels:
    {{- include "cloudflare-session-operator.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: metrics
      port: {{ .Values.containerPort }}
      targetPort: metrics
      protocol: TCP
  selector:
    {{- include "cloudflare-session-operator.selectorLabels" . | nindent 4 }}
