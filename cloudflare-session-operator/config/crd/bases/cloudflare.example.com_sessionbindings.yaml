apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: sessionbindings.cloudflare.example.com
spec:
  group: cloudflare.example.com
  names:
    kind: SessionBinding
    listKind: SessionBindingList
    plural: sessionbindings
    singular: sessionbinding
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [sessionID, targetDeployment]
              properties:
                sessionID:
                  type: string
                  description: "Cloudflare session identifier. Must be alphanumeric with hyphens/underscores."
                  pattern: "^[a-zA-Z0-9_-]{1,128}$"
                  minLength: 1
                  maxLength: 128
                userID:
                  type: string
                targetDeployment:
                  type: string
                  description: "Name of the deployment to clone pod template from."
                  minLength: 1
                  maxLength: 253
                ttlSeconds:
                  type: integer
                  format: int64
                  description: "How long the binding remains active after creation (60-86400 seconds)."
                  minimum: 60
                  maximum: 86400
            status:
              type: object
              properties:
                phase:
                  type: string
                boundPod:
                  type: string
                routeEndpoint:
                  type: string
                observedGeneration:
                  type: integer
                  format: int64
                lastReconcileTime:
                  type: string
                  format: date-time
                conditions:
                  type: array
                  items:
                    type: object
                    required: [type, status, reason, message]
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      reason:
                        type: string
                      message:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
      subresources:
        status: {}
