name: Terraform CI

on:
  workflow_call:
  pull_request:
    paths:
      - 'terraform/**'
  push:
    branches:
      - main
    paths:
      - 'terraform/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fmt-validate:
    name: fmt & validate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TF_IN_AUTOMATION: 'true'
    strategy:
      fail-fast: false
      matrix:
        working_directory:
          - terraform/configurations/cloudflare-session-operator
          - terraform/configurations/hello-world-database
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: '1.6.6'
          cli_config_credentials_token: ''

      - name: Terraform fmt (check)
        run: terraform -chdir=${{ matrix.working_directory }} fmt -check -recursive

      - name: Terraform init (no backend)
        run: terraform -chdir=${{ matrix.working_directory }} init -backend=false

      - name: Terraform validate
        run: terraform -chdir=${{ matrix.working_directory }} validate -no-color

  security-scan:
    name: security scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        working_directory:
          - terraform/configurations/cloudflare-session-operator
          - terraform/configurations/hello-world-database
          - terraform/modules/rds-postgres
          - terraform/modules/k8s-operator
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@de2bfaecd21d58ef232e0d2a3391c33c32c460d7 # v12.3096.0
        with:
          directory: ${{ matrix.working_directory }}
          framework: terraform
          soft_fail: false
          output_format: cli

      - name: Run Trivy IaC scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: config
          scan-ref: ${{ matrix.working_directory }}
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
